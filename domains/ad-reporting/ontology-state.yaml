ontology:
  domain: ad-reporting
  scope: 매체 데이터 수집부터 광고주 리포트 전달, 그리고 그 과정의 예외 처리까지
  outOfScope:
  - 광고 소재 제작
  - 매체 입찰 최적화
  - 정산
  version: 1.0.0
  competencyQuestions:
  - id: CQ-01
    question: 어제 실패한 리포트는 몇 건이고 각각 왜 실패했나?
    answeredBy:
    - ReportRun
    - ReportRun.failureReason
  - id: CQ-02
    question: 이 리포트 숫자는 어떤 원천 데이터에서 왔나?
    answeredBy:
    - consumes
    - derivedFrom
  - id: CQ-03
    question: 지금 리포트 발송을 막고 있는 예외는 무엇이고 담당자는 누구인가?
    answeredBy:
    - ExceptionCase
    - blocks
  - id: CQ-04
    question: 인증이 만료된 매체 계정은 어디이고 얼마나 지났나?
    answeredBy:
    - MediaAccount
    - MediaAccount.status
  - id: CQ-05
    question: 특정 광고주의 캠페인별 비용 추이는?
    answeredBy:
    - Campaign
    - Campaign.spend
    - owns
    - contains
  - id: CQ-06
    question: 전달된 리포트를 재생성한 이력과 승인자는?
    answeredBy:
    - ReportRun.supersededBy
    - regenerateReport
  glossary:
  - prefLabel: 리포트 실행
    altLabels:
    - 리포트 런
    - 배치
    - 리포트 생성
    definition: ReportRun 참조
    object: ReportRun
  - prefLabel: 예외 케이스
    altLabels:
    - 예외
    - 보정 건
    - 이슈
    definition: ExceptionCase 참조
    object: ExceptionCase
  - prefLabel: 광고주
    altLabels:
    - 클라이언트
    - 어카운트
    definition: Advertiser 참조
    object: Advertiser
objectTypes:
- name: Advertiser
  definition: 광고 계약의 주체이며 리포트 전달의 기준이 되는 광고주. 대행 관계의 최종 클라이언트를 말하며, 매체 계정 소유자와 다를 수 있다.
  alignedWith: kernel:Party (extends)
  justifiedBy:
  - CQ-05
  identity:
    key: advertiserId(UUID)
    externalIds:
    - 사업자번호
    - CRM 고객코드
    sameness: 사업자번호 기준
  owner:
    typeLevel: 데이터플랫폼팀
    instanceLevel: 담당 AE
  properties:
  - name: advertiserName
    type: string
    sourceOfTruth: CRM.accounts.name
  - name: tier
    type: enum
    allowed:
    - 표준
    - VIP
    sourceOfTruth: CRM.accounts.tier
  lifecycle:
    states:
    - 활성
    - 중지
    - 계약 변경
    transitions:
    - from: 활성
      to: 중지
      condition: 계약 종료 또는 미수금
- name: MediaAccount
  definition: 네이버/구글/카카오 등 매체 플랫폼의 광고 계정. 데이터 수집의 인증 단위다.
  justifiedBy:
  - CQ-04
  identity:
    key: mediaAccountId(UUID)
    externalIds:
    - 매체별 account_id
    sameness: 매체+account_id 조합
  owner:
    typeLevel: 데이터플랫폼팀
    instanceLevel: 미디어 운영 담당
  properties:
  - name: media
    type: enum
    allowed:
    - naver
    - google
    - kakao
    sourceOfTruth: 운영DB.media_accounts.media
  - name: status
    type: enum
    allowed:
    - 인증
    - 만료
    - 재연결 중
    sourceOfTruth: 수집기 인증 상태
  lifecycle:
    states:
    - 인증
    - 만료
    - 재연결 중
    transitions:
    - from: 인증
      to: 만료
      condition: 토큰 만료/권한 회수
    - from: 만료
      to: 재연결 중
      condition: 재인증 시작
      via: reconnectAccount
    - from: 재연결 중
      to: 인증
      condition: 인증 성공
- name: Campaign
  definition: 매체 내 광고 캠페인. 내부 대표 상태를 기준으로 관리하며 매체 원본 상태는 externalStatus로 보존한다.
  justifiedBy:
  - CQ-05
  identity:
    key: campaignId(UUID)
    externalIds:
    - 매체별 campaign_id
    sameness: 매체 campaign_id 기준. 복제 캠페인은 다른 객체
  owner:
    typeLevel: 데이터플랫폼팀
    instanceLevel: 담당 AE
  properties:
  - name: campaignName
    type: string
    sourceOfTruth: 매체 API
  - name: status
    type: enum
    allowed:
    - 운영
    - 중지
    - 종료
    - 보관
    sourceOfTruth: 매체 API(우선) + 운영DB
  - name: externalStatus
    type: string
    sourceOfTruth: 매체 API 원본값
  - name: spend
    type: decimal
    unit: KRW
    sourceOfTruth: 매체 API(KRW 환산)
  lifecycle:
    states:
    - 운영
    - 중지
    - 종료
    - 보관
- name: RawAdPerformance
  definition: 매체 API에서 수집된 가공 전 원천 성과 데이터. 신뢰 등급 '원천'이며 검증 전에는 리포트에 사용할 수 없다.
  justifiedBy:
  - CQ-02
  identity:
    key: rawId(계정+일자+수집시각)
  owner:
    typeLevel: 데이터플랫폼팀
    instanceLevel: 수집 파이프라인 담당
  properties:
  - name: collectedAt
    type: date
    sourceOfTruth: 수집기
  - name: status
    type: enum
    allowed:
    - 수집 대기
    - 수집 완료
    - 수집 실패
    sourceOfTruth: 수집기
  lifecycle:
    states:
    - 수집 대기
    - 수집 완료
    - 수집 실패
- name: CleanDataSet
  definition: 정제·검증이 끝난 리포트용 데이터셋. status가 '정상'인 것만 ReportRun이 소비할 수 있다.
  justifiedBy:
  - CQ-01
  - CQ-02
  identity:
    key: datasetId(광고주+기간+버전)
  owner:
    typeLevel: 데이터플랫폼팀
    instanceLevel: 데이터 QA 담당
  properties:
  - name: status
    type: enum
    allowed:
    - 검증 대기
    - 정상
    - 실패
    - 보류
    sourceOfTruth: 검증 파이프라인
  - name: failReason
    type: string
    sourceOfTruth: 검증 파이프라인
  lifecycle:
    states:
    - 검증 대기
    - 정상
    - 실패
    - 보류
    transitions:
    - from: 검증 대기
      to: 정상
      condition: 규칙 전건 통과
      via: validate
    - from: 검증 대기
      to: 실패
      condition: 규칙 위반
      via: validate
    - from: 실패
      to: 검증 대기
      condition: 보정 승인 후 재검증
      via: correctAndApprove
- name: ReportRun
  definition: 특정 광고주·기간·템플릿 조합에 대해 특정 시점에 수행된 리포트 생성 실행. 동일 조건이라도 실행 시점이 다르면 다른 ReportRun이다.
  justifiedBy:
  - CQ-01
  - CQ-06
  identity:
    key: reportRunId(UUID)
    externalIds:
    - batch_job_id
  owner:
    typeLevel: 데이터플랫폼팀
    instanceLevel: 해당 광고주 리포트 담당
  properties:
  - name: status
    type: enum
    allowed:
    - 생성 중
    - 완료
    - 실패
    - 재생성
    sourceOfTruth: 스케줄러 이벤트
  - name: failureReason
    type: enum
    allowed:
    - 데이터 검증 실패
    - 템플릿 오류
    - 시스템 오류
    - 기타
    sourceOfTruth: 스케줄러
  - name: triggeredBy
    type: enum
    allowed:
    - 스케줄
    - 수동
    - AI-Agent
    sourceOfTruth: 스케줄러
  - name: supersededBy
    type: link
    sourceOfTruth: 온톨로지
  lifecycle:
    states:
    - 생성 중
    - 완료
    - 실패
    - 재생성
    transitions:
    - from: 생성 중
      to: 완료
      condition: 정상 산출
    - from: 생성 중
      to: 실패
      condition: 오류
    - from: 실패
      to: 재생성
      condition: 연관 ExceptionCase 전건 해결
      via: regenerateReport
    - from: 완료
      to: 재생성
      condition: 전달 후에는 팀장 승인 필수
      via: regenerateReport
- name: ReportTemplate
  definition: 리포트 산출 형식과 지표 구성을 정의한 템플릿. 모든 ReportRun에 필수다.
  justifiedBy:
  - CQ-01
  identity:
    key: templateId(UUID)
  owner:
    typeLevel: 리포트 운영팀
    instanceLevel: 템플릿 작성자
  lifecycle:
    states:
    - 활성
    - 폐기
- name: ReportFile
  definition: ReportRun이 산출한 전달물 파일. 커널 Document를 확장한다.
  alignedWith: kernel:Document (extends)
  justifiedBy:
  - CQ-06
  identity:
    key: fileId(UUID)
  owner:
    typeLevel: 리포트 운영팀
    instanceLevel: 해당 광고주 리포트 담당
  properties:
  - name: status
    type: enum
    allowed:
    - 생성됨
    - 전달됨
    - 만료
    sourceOfTruth: 전달 시스템
  lifecycle:
    states:
    - 생성됨
    - 전달됨
    - 만료
- name: ExceptionCase
  definition: 수동 보정·승인·재처리가 필요한 예외. 미해결(오픈/처리 중) 상태는 연관 ReportRun을 차단한다.
  alignedWith: kernel:ExceptionCase (extends)
  justifiedBy:
  - CQ-03
  identity:
    key: caseId(UUID)
  owner:
    typeLevel: 데이터플랫폼팀
    instanceLevel: 라우팅 규칙에 따라 배정
  properties:
  - name: status
    type: enum
    allowed:
    - 오픈
    - 처리 중
    - 해결
    - 보류
    sourceOfTruth: 온톨로지
  - name: reason
    type: string
    sourceOfTruth: 생성 규칙
  lifecycle:
    states:
    - 오픈
    - 처리 중
    - 해결
    - 보류
    transitions:
    - from: 오픈
      to: 처리 중
      condition: 담당자 배정
    - from: 처리 중
      to: 해결
      condition: 보정 사유 기록 필수
      via: correctAndApprove
linkTypes:
- subject: Advertiser
  predicate: owns
  object: MediaAccount
  cardinality: 1:N
  required: true
- subject: MediaAccount
  predicate: contains
  object: Campaign
  cardinality: 1:N
  required: true
- subject: Campaign
  predicate: produces
  object: RawAdPerformance
  cardinality: 1:N
  required: false
- subject: CleanDataSet
  predicate: derivedFrom
  object: RawAdPerformance
  cardinality: 1:N
  required: true
- subject: ReportRun
  predicate: consumes
  object: CleanDataSet
  cardinality: N:1
  required: true
- subject: ReportRun
  predicate: hasTemplate
  object: ReportTemplate
  cardinality: N:1
  required: true
- subject: ReportRun
  predicate: generates
  object: ReportFile
  cardinality: 1:N
  required: false
- subject: ExceptionCase
  predicate: blocks
  object: ReportRun
  cardinality: N:M
  required: false
- subject: ReportRun
  predicate: forAdvertiser
  object: Advertiser
  cardinality: N:1
  required: true
rules:
- id: R-01
  kind: invariant
  statement: 비용(spend)은 0 이상이어야 한다
  severity: critical
  onViolation: CleanDataSet 검증 실패 처리 + ExceptionCase 자동 오픈
  basis: 매체 환불 조정 케이스 존재 확인(증거 E-07) — 금지 대신 예외 오픈
  check:
    targetClass: Campaign
    path: spend
    datatype: decimal
    minInclusive: 0
- id: R-02
  kind: transition
  statement: ReportRun은 status가 '정상'인 CleanDataSet만 소비할 수 있다
  severity: critical
  onViolation: Run 시작 차단, 사유 로그
  check:
    targetClass: ReportRun
    path:
    - consumes
    - status
    hasValue: 정상
- id: R-03
  kind: invariant
  statement: ReportRun에는 ReportTemplate이 필수다
  severity: critical
  onViolation: Run 생성 거부
  check:
    targetClass: ReportRun
    path: hasTemplate
    minCount: 1
- id: R-04
  kind: policy
  statement: 전일 대비 spend 변동 ±40% 초과 시 자동 승인 불가 (예산 변경 이력 있으면 제외)
  severity: warning
  onViolation: ExceptionCase 오픈, 담당자 확인 후 진행
  basis: 사내 결정 (기계 검증은 파이프라인 단계에서 수행)
- id: R-05
  kind: transition
  statement: 미해결 ExceptionCase가 blocks하는 ReportRun은 시작·전달 불가
  severity: critical
  onViolation: 차단 + 담당자 라우팅
actions:
- name: collectData
  target: MediaAccount
  precondition: status=인증
  effect: RawAdPerformance 생성/갱신
  permission:
  - AI-Agent
  approval: 불필요
  autonomy: auto
  idempotency: 계정+일자 중복 수집 방지
  audit: 수집 이력
- name: reconnectAccount
  target: MediaAccount
  precondition: status=만료
  effect: 재연결 중 → 인증
  permission:
  - 미디어 운영 담당
  approval: 불필요
  autonomy: human-approval
  idempotency: '-'
  audit: 재인증 이력
- name: validate
  target: CleanDataSet
  precondition: status=검증 대기
  effect: 정상 또는 실패+사유
  permission:
  - AI-Agent
  approval: 불필요
  autonomy: auto
  idempotency: 데이터셋 버전당 1회
  audit: 검증 리포트
- name: assignCase
  target: ExceptionCase
  precondition: status=오픈
  effect: 처리 중 + 담당자 기록
  permission:
  - AI-Agent
  - 데이터 QA 담당
  approval: 불필요
  autonomy: auto
  idempotency: 케이스당 1회
  audit: 배정 이력
- name: correctAndApprove
  target: ExceptionCase
  precondition: status=처리 중, 보정값·사유 입력
  effect: 해결 + 연관 재검증 트리거
  permission:
  - 데이터 QA 담당
  approval: 사유 기록 필수
  autonomy: human-approval
  idempotency: '-'
  audit: 보정 이력(사유 포함)
- name: regenerateReport
  target: ReportRun
  precondition: 실패 또는 완료 상태, 연관 Case 전건 해결
  effect: 새 Run 생성 + supersededBy 링크
  permission:
  - 리포트 담당
  - AI-Agent
  approval: 전달 후 재생성은 팀장 승인
  autonomy: auto-then-escalate(1)
  idempotency: 동일 (데이터셋, 템플릿) 조합 중복 방지
  audit: 재생성 사유·승인자
- name: deliverReport
  target: ReportFile
  precondition: Run 완료 + R-05 통과
  effect: 전달됨
  permission:
  - AI-Agent
  - 리포트 담당
  approval: VIP 광고주는 담당자 확인
  autonomy: auto-then-escalate(1)
  idempotency: 파일당 1회 전달
  audit: 전달 이력
reuse:
- internal: Advertiser
  alignedWith: kernel:Party
  decision: adapt
  note: extends로 확장
  source: kernel/kernel.yaml
- internal: Campaign
  alignedWith: IAB 용어 'Line Item' 유사
  decision: reject
  note: 사내 통칭 Campaign 유지 [사용자 확인 필요]
  source: packs/advertising.pack.yaml
openItems:
  unconfirmed:
  - 'CleanDataSet ''보류'' 상태의 정확한 발생 조건 [B: 진술만]'
  parkingLot:
  - 정산 도메인 연계
  - 소재 관리
  dataGaps:
  - 'ExceptionCase 보정 사유가 현재 미수집 — 개선 과제 #12'
